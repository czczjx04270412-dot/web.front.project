<!DOCTYPE html>
<html>
<head>
  <title>Rock Paper Scissors Pro</title>
  <link rel="stylesheet" href="rock.scissors.paper.css">
</head>
<body>

  <div class="title">Rock Paper Scissors Pro</div>

  <button class="move-btn" data-move="rock" ><img src="rock-emoji.png" alt="rock" class="picture-icon"></button>
  <button class="move-btn" data-move="paper"><img src="paper-emoji.png" alt="rock" class="picture-icon"></button>
  <button class="move-btn" data-move="scissors"><img src="scissors-emoji.png" alt="rock" class="picture-icon"></button>

  <div class="result" id="result">Choose your move</div>

  <div class="score" id="score"></div>

  <button class="control-btn" id="resetBtn">Reset Score</button>
  <button class="control-btn" id="autoBtn">Auto Play</button>

<script src="rock.scissors.paper.js"></script>

</body>
</html>
